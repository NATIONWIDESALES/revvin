name: Content Guards

on:
  pull_request:
  push:
    branches: [main]

jobs:
  content-guards:
    name: Run content-guards test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run content-guards test
        run: bunx vitest run src/test/content-guards.test.ts
